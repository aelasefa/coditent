services:
  db:
    image: postgres:16-alpine
    container_name: coditent-db
    environment:
      POSTGRES_DB: coditent
      POSTGRES_USER: coditent
      POSTGRES_PASSWORD: coditent
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coditent -d coditent"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: coditent-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://coditent:coditent@db:5432/coditent
      FRONTEND_URL: http://localhost:3001
      GEMINI_API_KEY: local-dev-placeholder
      JWT_SECRET: local-dev-secret
    ports:
      - "8001:8000"
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: coditent-web
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    ports:
      - "3001:3000"

volumes:
  db_data:
